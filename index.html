<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Φυσικοχημεία — Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --surface2: #F0EEE8;
      --border: #E0DDD4;
      --border2: #C8C5BB;
      --text: #1A1916;
      --text2: #6B6860;
      --text3: #9B9890;
      --green: #1D9E75;
      --green-bg: #E1F5EE;
      --green-dark: #0F6E56;
      --red: #E24B4A;
      --red-bg: #FCEBEB;
      --red-dark: #A32D2D;
      --accent: #3A5CCC;
      --radius: 10px;
      --radius-sm: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    /* HEADER */
    .site-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .site-header h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 4px;
    }
    .site-header p {
      font-size: 14px;
      color: var(--text2);
    }

    /* SCREENS */
    .screen { display: none; }
    .screen.active { display: block; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }
    .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-size: 28px; font-weight: 600; color: var(--text); font-family: 'IBM Plex Mono', monospace; }

    /* CHAPTER GRID */
    .section-label {
      font-size: 12px; font-weight: 500; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 2rem;
    }
    .chapter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      user-select: none;
    }
    .chapter-card:hover {
      border-color: var(--border2);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transform: translateY(-1px);
    }
    .chapter-card:active { transform: translateY(0); }
    .chapter-card.done { border-color: var(--green); }
    .ch-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .ch-num { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
    .ch-check { font-size: 14px; color: var(--green); }
    .ch-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    .ch-count { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .ch-bar { height: 3px; background: var(--border); border-radius: 2px; }
    .ch-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }

    /* QUIZ SCREEN */
    .quiz-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text2);
      cursor: pointer; border: none; background: none; padding: 0;
      font-family: inherit;
    }
    .back-btn:hover { color: var(--text); }
    .back-arrow { font-size: 16px; }
    .quiz-chapter-title { font-size: 14px; font-weight: 500; color: var(--text); }

    .progress-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 1.75rem;
    }
    .prog-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
    .prog-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
    .prog-text { font-size: 12px; color: var(--text2); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      margin-bottom: 1rem;
    }
    .question-text {
      font-size: 16px; line-height: 1.65; color: var(--text);
      margin-bottom: 1.5rem; font-weight: 500;
    }

    .options { display: flex; flex-direction: column; gap: 8px; }
    .option {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px; color: var(--text); line-height: 1.5;
    }
    .option:hover:not(.disabled) {
      border-color: var(--border2);
      background: var(--surface2);
    }
    .option.correct { background: var(--green-bg); border-color: var(--green); color: var(--green-dark); }
    .option.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red-dark); }
    .option.disabled { cursor: default; }
    .opt-letter {
      font-weight: 600; min-width: 20px; font-size: 13px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .explanation {
      display: none;
      margin-top: 1.25rem;
      padding: 14px 16px;
      background: #EEF3FF;
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 13px; line-height: 1.65; color: #1e2d5a;
    }
    .explanation.show { display: block; }
    .explanation strong { font-weight: 600; }

    .quiz-footer {
      display: flex; justify-content: flex-end;
      margin-top: 1rem;
    }

    /* BUTTONS */
    button {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover { background: var(--surface2); border-color: var(--text2); }
    button:active { transform: scale(0.98); }
    button.primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    button.primary:hover { opacity: 0.85; }

    /* RESULTS SCREEN */
    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .res-score {
      font-size: 56px; font-weight: 600;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text); margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .res-label { font-size: 15px; color: var(--text2); margin-bottom: 2rem; }
    .res-details {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; text-align: center;
    }
    .rd {
      padding: 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }
    .rd-val { font-size: 22px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
    .rd.correct .rd-val { color: var(--green-dark); }
    .rd.wrong .rd-val { color: var(--red-dark); }
    .rd-lbl { font-size: 12px; color: var(--text2); margin-top: 3px; }

    .results-actions { display: flex; gap: 10px; justify-content: center; }

    /* RESET NOTICE */
    .reset-row {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .reset-row p { font-size: 13px; color: var(--text3); }
    .reset-btn {
      font-size: 12px; color: var(--text3); background: none;
      border: 1px solid var(--border); padding: 6px 14px;
    }
    .reset-btn:hover { color: var(--red); border-color: var(--red); background: var(--red-bg); }

    @media (max-width: 500px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .stats-row .stat-card:last-child { grid-column: span 2; }
      .chapter-grid { grid-template-columns: 1fr 1fr; }
      .res-details { grid-template-columns: 1fr; }
      .results-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="site-header">
    <h1>Φυσικοχημεία — Quiz</h1>
    <p>Επίλεξε κεφάλαιο και ξεκίνα εξάσκηση</p>
  </div>

  <!-- HOME SCREEN -->
  <div id="homeScreen" class="screen active">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Ερωτήσεις</div>
        <div class="stat-value" id="totalDone">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Σωστές</div>
        <div class="stat-value" id="totalCorrect">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Επιτυχία</div>
        <div class="stat-value" id="totalPct">—</div>
      </div>
    </div>

    <div class="section-label">Κεφάλαια</div>
    <div class="chapter-grid" id="chapterGrid"></div>

    <div class="reset-row">
      <p>Επαναφορά όλης της προόδου</p>
      <button class="reset-btn" onclick="resetAll()">Επαναφορά</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen" class="screen">
    <div class="quiz-nav">
      <button class="back-btn" onclick="goHome()">
        <span class="back-arrow">←</span> Κεφάλαια
      </button>
      <span class="quiz-chapter-title" id="quizTitle"></span>
    </div>

    <div class="progress-row">
      <div class="prog-bar"><div class="prog-fill" id="quizProgress" style="width:0%"></div></div>
      <span class="prog-text" id="quizProgressText">1 / ?</span>
    </div>

    <div class="question-card">
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="explanation" id="explanation"></div>
    </div>

    <div class="quiz-footer">
      <button class="primary" id="nextBtn" style="display:none;" onclick="nextQuestion()">Επόμενη →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="resultsScreen" class="screen">
    <div class="results-card">
      <div class="res-score" id="resultScore"></div>
      <div class="res-label" id="resultLabel"></div>
      <div class="res-details">
        <div class="rd correct">
          <div class="rd-val" id="resCorrect"></div>
          <div class="rd-lbl">Σωστές</div>
        </div>
        <div class="rd wrong">
          <div class="rd-val" id="resWrong"></div>
          <div class="rd-lbl">Λάθος</div>
        </div>
        <div class="rd">
          <div class="rd-val" id="resTotal"></div>
          <div class="rd-lbl">Σύνολο</div>
        </div>
      </div>
    </div>
    <div class="results-actions">
      <button onclick="retryChapter()">Ξαναπροσπάθησε</button>
      <button class="primary" onclick="goHome()">Επιλογή κεφαλαίου</button>
    </div>
  </div>

</div>

<script>
// ============================================================
// ΕΡΩΤΗΣΕΙΣ — Εδώ προσθέτεις / τροποποιείς ερωτήσεις
// Κάθε κεφάλαιο έχει: id, title, questions[]
// Κάθε ερώτηση έχει: q (κείμενο), opts[] (4 επιλογές), correct (0-3), exp (επεξήγηση)
// ============================================================
const CHAPTERS = [
  {
    id: 1,
    title: "Θερμοδυναμική",
    questions: [
      {
        q: "Ποια είναι η μαθηματική έκφραση του πρώτου νόμου της θερμοδυναμικής;",
        opts: ["ΔU = q + w", "ΔG = ΔH − TΔS", "ΔS = q_rev / T", "PV = nRT"],
        correct: 0,
        exp: "Ο πρώτος νόμος ορίζει ότι η μεταβολή εσωτερικής ενέργειας (ΔU) ισούται με το άθροισμα θερμότητας (q) και έργου (w) που ανταλλάσσει το σύστημα."
      },
      {
        q: "Τι εκφράζει η ενέργεια Gibbs (G);",
        opts: [
          "Την εσωτερική ενέργεια ενός συστήματος",
          "Το κριτήριο αυθόρμητης αντίδρασης σε σταθερές T και P",
          "Την εντροπία του σύμπαντος",
          "Τη θερμοχωρητικότητα σε σταθερό όγκο"
        ],
        correct: 1,
        exp: "Η ΔG = ΔH − TΔS είναι αρνητική για αυθόρμητες διεργασίες σε σταθερή θερμοκρασία και πίεση."
      },
      {
        q: "Ποια δήλωση για την εντροπία είναι σωστή σύμφωνα με τον δεύτερο νόμο;",
        opts: [
          "Η εντροπία κλειστού συστήματος μπορεί να μειωθεί αυθόρμητα",
          "Η συνολική εντροπία του σύμπαντος αυξάνεται σε κάθε μη αντιστρεπτή διεργασία",
          "Η εντροπία είναι συνάρτηση μόνο της πίεσης",
          "Κάθε αντίδραση με ΔS > 0 είναι αυθόρμητη"
        ],
        correct: 1,
        exp: "Ο δεύτερος νόμος: ΔS_σύμπαν ≥ 0. Σε αντιστρεπτές διεργασίες ΔS = 0, σε μη αντιστρεπτές ΔS > 0."
      },
      {
        q: "Τι ορίζει ο τρίτος νόμος της θερμοδυναμικής;",
        opts: [
          "Η ενέργεια δεν δημιουργείται ούτε καταστρέφεται",
          "Η εντροπία τέλεια κρυστάλλου στο απόλυτο μηδέν είναι μηδέν",
          "Η θερμότητα ρέει από ψυχρό σε θερμό",
          "Το έργο ισούται πάντα με P·ΔV"
        ],
        correct: 1,
        exp: "Ο τρίτος νόμος θέτει το απόλυτο μηδέν ως σημείο αναφοράς: S(0K) = 0 για τέλειο κρύσταλλο."
      },
      {
        q: "Σε ποια συνθήκη μια χημική αντίδραση είναι αυθόρμητη ανεξαρτήτως θερμοκρασίας;",
        opts: ["ΔH > 0 και ΔS < 0", "ΔH < 0 και ΔS < 0", "ΔH < 0 και ΔS > 0", "ΔH > 0 και ΔS > 0"],
        correct: 2,
        exp: "Όταν ΔH < 0 (εξώθερμη) και ΔS > 0, τότε ΔG = ΔH − TΔS είναι πάντα αρνητική ανεξαρτήτως θερμοκρασίας."
      }
    ]
  },
  {
    id: 2,
    title: "Χημική Κινητική",
    questions: [
      {
        q: "Τι εκφράζει η εξίσωση Arrhenius;",
        opts: [
          "Τη σχέση ταχύτητας–ενέργειας ενεργοποίησης και θερμοκρασίας",
          "Τη θερμοδυναμική ισορροπία αντίδρασης",
          "Τον ρυθμό διάχυσης αερίων",
          "Την αλλαγή ελεύθερης ενέργειας"
        ],
        correct: 0,
        exp: "k = A·e^(−Ea/RT). Η εξίσωση Arrhenius δείχνει πώς η σταθερά ταχύτητας k εξαρτάται εκθετικά από την ενέργεια ενεργοποίησης Eₐ και τη θερμοκρασία T."
      },
      {
        q: "Ποια είναι η μονάδα σταθεράς ταχύτητας αντίδρασης δεύτερης τάξης στο SI;",
        opts: ["s⁻¹", "mol·L⁻¹·s⁻¹", "L·mol⁻¹·s⁻¹", "L²·mol⁻²·s⁻¹"],
        correct: 2,
        exp: "Για αντίδραση 2ης τάξης: rate = k[A][B], άρα k = rate / ([A][B]) → (mol/L/s) / (mol/L)² = L·mol⁻¹·s⁻¹."
      },
      {
        q: "Πώς ορίζεται ο χρόνος ημιζωής (t₁/₂) για αντίδραση πρώτης τάξης;",
        opts: ["t₁/₂ = k / [A]₀", "t₁/₂ = ln2 / k", "t₁/₂ = 1 / (k·[A]₀)", "t₁/₂ = 2·[A]₀ / k"],
        correct: 1,
        exp: "Για 1η τάξη: ln[A] = ln[A]₀ − kt. Ο χρόνος ημιζωής είναι ανεξάρτητος της συγκέντρωσης: t₁/₂ = ln2/k ≈ 0.693/k."
      },
      {
        q: "Τι ρόλο παίζει ο καταλύτης σε μια χημική αντίδραση;",
        opts: [
          "Αυξάνει τη συγκέντρωση των αντιδρώντων",
          "Μειώνει την ενέργεια ενεργοποίησης χωρίς να καταναλώνεται",
          "Αλλάζει τη θερμοδυναμική ισορροπία",
          "Αυξάνει τη θερμοκρασία του συστήματος"
        ],
        correct: 1,
        exp: "Ο καταλύτης παρέχει εναλλακτικό μηχανισμό με χαμηλότερη Eₐ. Δεν μεταβάλλει τις θερμοδυναμικές ποσότητες (ΔG, K) και δεν καταναλώνεται στην αντίδραση."
      }
    ]
  },
  {
    id: 3,
    title: "Ηλεκτροχημεία",
    questions: [
      {
        q: "Ποια είναι η εξίσωση Nernst;",
        opts: [
          "E = E° − (RT/nF)·lnQ",
          "ΔG = −nFE°",
          "E = E° + (RT/nF)·lnK",
          "ΔG° = −RT·lnK"
        ],
        correct: 0,
        exp: "Η εξίσωση Nernst: E = E° − (RT/nF)·lnQ συνδέει το δυναμικό κελιού με τις συγκεντρώσεις των αντιδρώντων και προϊόντων."
      },
      {
        q: "Ποια σχέση συνδέει τη μεταβολή Gibbs με το δυναμικό κελιού;",
        opts: ["ΔG = nRT·lnE", "ΔG = −nFE", "ΔG = nFE°", "ΔG = −RT·lnE"],
        correct: 1,
        exp: "ΔG = −nFE, όπου n οι mol ηλεκτρονίων, F η σταθερά Faraday (96485 C/mol), E το δυναμικό κελιού."
      },
      {
        q: "Τι μετράει ο αριθμός μεταφοράς (transport number) ιόντος;",
        opts: [
          "Τη μάζα ιόντος που αποτίθεται στην ηλεκτρόλυση",
          "Το κλάσμα του συνολικού ρεύματος που μεταφέρει κάθε είδος ιόντος",
          "Την κινητικότητα ιόντος σε ηλεκτρικό πεδίο",
          "Τη συγκέντρωση ηλεκτρολύτη"
        ],
        correct: 1,
        exp: "t₊ + t₋ = 1. Ο αριθμός μεταφοράς εκφράζει ποιο κλάσμα του συνολικού ηλεκτρικού ρεύματος μεταφέρεται από κάθε είδος ιόντος."
      },
      {
        q: "Τι γίνεται στην άνοδο ενός γαλβανικού κελιού;",
        opts: ["Αναγωγή — ηλεκτρόνια προστίθενται", "Οξείδωση — ηλεκτρόνια αποβάλλονται", "Δεν γίνεται καμία αντίδραση", "Κατακρήμνιση ιόντων"],
        correct: 1,
        exp: "Στην άνοδο γίνεται οξείδωση (απώλεια ηλεκτρονίων). Τα ηλεκτρόνια μεταφέρονται μέσω εξωτερικού κυκλώματος προς την κάθοδο όπου γίνεται αναγωγή."
      }
    ]
  },
  {
    id: 4,
    title: "Χημική Ισορροπία",
    questions: [
      {
        q: "Τι εκφράζει η αρχή Le Chatelier;",
        opts: [
          "Ότι η ισορροπία επιτυγχάνεται πάντα σε χαμηλή θερμοκρασία",
          "Ότι το σύστημα ανταποκρίνεται σε διαταραχή ώστε να αντιταχθεί σε αυτήν",
          "Ότι η σταθερά ισορροπίας K δεν εξαρτάται από τη θερμοκρασία",
          "Ότι η πίεση δεν επηρεάζει ισορροπίες αερίων"
        ],
        correct: 1,
        exp: "Αρχή Le Chatelier: αν διαταραχθεί ισορροπία, το σύστημα μετατοπίζεται προς την κατεύθυνση που αντιτίθεται στη διαταραχή."
      },
      {
        q: "Ποια σχέση συνδέει τη σταθερά ισορροπίας K με τη μεταβολή ελεύθερης ενέργειας ΔG°;",
        opts: ["ΔG° = RT·lnK", "ΔG° = −RT·lnK", "K = ΔG°/RT", "ΔG° = −nF·lnK"],
        correct: 1,
        exp: "ΔG° = −RT·lnK. Για αυθόρμητες αντιδράσεις (ΔG° < 0), K > 1 — τα προϊόντα ευνοούνται στην ισορροπία."
      },
      {
        q: "Αν αυξηθεί η θερμοκρασία σε μια εξώθερμη αντίδραση σε ισορροπία, τι συμβαίνει;",
        opts: [
          "Η ισορροπία μετατοπίζεται προς τα προϊόντα και το K αυξάνει",
          "Η ισορροπία μετατοπίζεται προς τα αντιδρώντα και το K μειώνεται",
          "Το K παραμένει σταθερό αλλά αλλάζει ο ρυθμός",
          "Η αντίδραση σταματά"
        ],
        correct: 1,
        exp: "Για εξώθερμη αντίδραση (ΔH < 0), αύξηση T ευνοεί την αντίστροφη κατεύθυνση (απορρόφηση θερμότητας), μειώνοντας το K."
      }
    ]
  },
  {
    id: 5,
    title: "Φασματοσκοπία & Δομή",
    questions: [
      {
        q: "Τι μετράει η φασματοσκοπία UV-Vis;",
        opts: [
          "Δονήσεις δεσμών μορίου",
          "Απορρόφηση φωτός από ηλεκτρονικές μεταβάσεις",
          "Περιστροφές μορίων σε αέρια φάση",
          "Πυρηνικές μαγνητικές στροφορμές"
        ],
        correct: 1,
        exp: "Η UV-Vis φασματοσκοπία ανιχνεύει ηλεκτρονικές μεταβάσεις (π → π*, n → π*). Σύμφωνα με τον νόμο Beer-Lambert: A = ε·c·l."
      },
      {
        q: "Τι ορίζει ο νόμος Beer-Lambert;",
        opts: [
          "Η απορρόφηση είναι αντιστρόφως ανάλογη της συγκέντρωσης",
          "Η απορρόφηση είναι ανάλογη της συγκέντρωσης και του μήκους διαδρομής",
          "Η ένταση φωτός είναι ανεξάρτητη της συγκέντρωσης",
          "Η απορρόφηση εξαρτάται μόνο από το μήκος κύματος"
        ],
        correct: 1,
        exp: "A = ε·c·l, όπου ε ο μοριακός συντελεστής απορρόφησης, c η συγκέντρωση, l το μήκος διαδρομής. Η σχέση είναι γραμμική για αραιά διαλύματα."
      }
    ]
  }
];

// ============================================================
// APP LOGIC — Δεν χρειάζεται να τροποποιήσεις παρακάτω
// ============================================================
let state = {
  progress: {},
  currentChapter: null,
  currentQIdx: 0,
  answered: false,
  sessionCorrect: 0,
  sessionTotal: 0
};

function loadState() {
  try {
    const s = localStorage.getItem('physChem_v1_progress');
    if (s) state.progress = JSON.parse(s);
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('physChem_v1_progress', JSON.stringify(state.progress)); } catch(e) {}
}

function getChapterProgress(chId) {
  return state.progress[chId] || { done: 0, correct: 0 };
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderHome() {
  let totalDone = 0, totalCorrect = 0;
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = '';

  CHAPTERS.forEach(ch => {
    const p = getChapterProgress(ch.id);
    totalDone += p.done;
    totalCorrect += p.correct;
    const pct = ch.questions.length > 0 ? Math.round((p.done / ch.questions.length) * 100) : 0;
    const isDone = pct === 100;

    const card = document.createElement('div');
    card.className = 'chapter-card' + (isDone ? ' done' : '');
    card.innerHTML = `
      <div class="ch-meta">
        <span class="ch-num">Κεφ. ${ch.id}</span>
        ${isDone ? '<span class="ch-check">✓</span>' : ''}
      </div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-count">${ch.questions.length} ερωτήσεις · ${p.correct}/${p.done} σωστές</div>
      <div class="ch-bar"><div class="ch-fill" style="width:${pct}%"></div></div>
    `;
    card.onclick = () => startChapter(ch.id);
    grid.appendChild(card);
  });

  document.getElementById('totalDone').textContent = totalDone;
  document.getElementById('totalCorrect').textContent = totalCorrect;
  document.getElementById('totalPct').textContent = totalDone > 0 ? Math.round(totalCorrect / totalDone * 100) + '%' : '—';
}

function startChapter(chId) {
  state.currentChapter = CHAPTERS.find(c => c.id === chId);
  state.currentQIdx = 0;
  state.sessionCorrect = 0;
  state.sessionTotal = 0;
  state.answered = false;
  document.getElementById('quizTitle').textContent = state.currentChapter.title;
  showScreen('quizScreen');
  renderQuestion();
}

function renderQuestion() {
  const ch = state.currentChapter;
  const q = ch.questions[state.currentQIdx];
  const total = ch.questions.length;

  document.getElementById('quizProgress').style.width = Math.round((state.currentQIdx / total) * 100) + '%';
  document.getElementById('quizProgressText').textContent = (state.currentQIdx + 1) + ' / ' + total;
  document.getElementById('questionText').textContent = q.q;
  document.getElementById('explanation').className = 'explanation';
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('nextBtn').style.display = 'none';
  state.answered = false;

  const letters = ['Α', 'Β', 'Γ', 'Δ'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';

  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="opt-letter">${letters[i]}.</span><span>${opt}</span>`;
    div.onclick = () => selectAnswer(i);
    container.appendChild(div);
  });
}

function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.currentChapter.questions[state.currentQIdx];
  const opts = document.querySelectorAll('.option');
  const isCorrect = idx === q.correct;

  opts.forEach((o, i) => {
    o.classList.add('disabled');
    if (i === q.correct) o.classList.add('correct');
    else if (i === idx) o.classList.add('wrong');
  });

  const expEl = document.getElementById('explanation');
  expEl.innerHTML = '<strong>Επεξήγηση:</strong> ' + q.exp;
  expEl.classList.add('show');

  if (isCorrect) state.sessionCorrect++;
  state.sessionTotal++;

  const p = getChapterProgress(state.currentChapter.id);
  p.done = (p.done || 0) + 1;
  if (isCorrect) p.correct = (p.correct || 0) + 1;
  state.progress[state.currentChapter.id] = p;
  saveState();

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = state.currentQIdx < state.currentChapter.questions.length - 1
    ? 'Επόμενη →' : 'Δες αποτελέσματα →';
  nextBtn.style.display = 'block';
}

function nextQuestion() {
  if (state.currentQIdx < state.currentChapter.questions.length - 1) {
    state.currentQIdx++;
    renderQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  const pct = Math.round((state.sessionCorrect / state.sessionTotal) * 100);
  document.getElementById('resultScore').textContent = pct + '%';
  document.getElementById('resultLabel').textContent =
    pct >= 80 ? 'Εξαιρετικό — συνέχισε έτσι!' :
    pct >= 60 ? 'Καλή προσπάθεια, λίγο ακόμα!' :
    'Χρειάζεται περισσότερη εξάσκηση';
  document.getElementById('resCorrect').textContent = state.sessionCorrect;
  document.getElementById('resWrong').textContent = state.sessionTotal - state.sessionCorrect;
  document.getElementById('resTotal').textContent = state.sessionTotal;
  showScreen('resultsScreen');
}

function retryChapter() { startChapter(state.currentChapter.id); }

function goHome() { renderHome(); showScreen('homeScreen'); }

function resetAll() {
  if (confirm('Είσαι σίγουρη ότι θέλεις να διαγράψεις όλη την πρόοδο;')) {
    state.progress = {};
    saveState();
    renderHome();
  }
}

loadState();
renderHome();
</script>
